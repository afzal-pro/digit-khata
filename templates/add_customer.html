<!DOCTYPE html>
<html>
<head>
    <title>Naya Customer Add Karein</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>👤 Naya Customer Add Karein</h2>
        <a href="/" class="btn btn-delete">🔙 Wapas Dashboard</a>
        <br><br>


        <form action="/add" method="POST" style="display: flex; flex-direction: column; gap: 15px; max-width: 400px;">
            <div>
                <label>Customer Ka Naam:</label><br>
                <input type="text" name="name" required style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            
            <div>
                <label>Phone Number:</label><br>
                <input type="text" name="phone" required style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <button type="submit" class="btn btn-green" style="font-size: 16px;">💾 Save Customer</button>
        </form>
    </div>
</body>
</html>
